<div class="min-h-screen flex items-center justify-center bg-[#f8f9fd] px-4">
  <div class="w-full max-w-5xl bg-white rounded-md shadow-xl overflow-hidden md:flex">
    <div class="w-full md:w-1/2 p-6 md:p-10">
      <h3 class="text-2xl font-semibold mb-6 text-gray-800">
        Inicio de sesion
      </h3>

      <form [formGroup]="loginForm" (ngSubmit)="login()" class="space-y-5">
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">
            Correo
          </label>
          <input
            type="email"
            name="email"
            (keyup.enter)="login()"
            formControlName="email"
            placeholder="usuario@correo.com"
            class="w-full border border-gray-300 px-3 py-2 rounded focus:outline-none focus:ring-2 focus:ring-gray-800"
          />
        </div>

        <div class="relative">
          <input
            [type]="showPassword ? 'text' : 'password'"
            name="password"
            (keyup.enter)="login()"
            formControlName="password"
            placeholder="Contrasena"
            class="w-full border border-gray-300 px-3 py-2 pr-10 rounded focus:outline-none focus:ring-2 focus:ring-gray-800"
          />

          <button
            type="button"
            (click)="togglePassword()"
            class="absolute inset-y-0 right-0 px-3 flex items-center text-gray-500 hover:text-gray-800"
          >
            <lucide-icon
              [name]="showPassword ? icons.EyeOff : icons.Eye"
              class="h-5 w-5"
            ></lucide-icon>
          </button>
        </div>

        <button
          type="submit"
          class="w-full bg-[#1f2937] text-white py-2.5 rounded font-medium hover:bg-black transition"
        >
          Ingresar
        </button>
      </form>

      <div class="flex justify-between mt-4 text-sm">
        <a
          routerLink="/register"
          class="underline cursor-pointer text-gray-700"
        >
          Crear cuenta
        </a>

        <a
          routerLink="/forgot-password"
          class="underline cursor-pointer text-gray-700"
        >
          Olvide mi contraseña
        </a>
      </div>

      <p class="text-xs text-center text-gray-500 mt-6 leading-relaxed">
        Al iniciar o crear una cuenta, acepta
        <a class="underline cursor-pointer">terminos y condiciones</a>
        y autoriza el
        <a class="underline cursor-pointer">tratamiento de sus datos personales</a>
      </p>
    </div>

    <div
      class="hidden md:block md:w-1/2 bg-black bg-no-repeat bg-center bg-contain"
      style="background-image: url('/images/auth/login-bg.png')"
    ></div>
  </div>
</div>

<app-loading-spinner [show]="loading()"></app-loading-spinner>
