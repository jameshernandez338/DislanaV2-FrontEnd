<div class="min-h-screen flex items-center justify-center bg-[#f8f9fd] px-4">
  <div class="w-full max-w-5xl bg-white rounded-md shadow-xl overflow-hidden md:flex">
    <div class="w-full md:w-1/2 p-6 md:p-10">
      <h3 class="text-2xl font-semibold mb-6 text-gray-800">Crear cuenta</h3>

      <form [formGroup]="registerForm" (ngSubmit)="register()" class="space-y-4">
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">Nombre completo</label>
          <input
            formControlName="fullName"
            type="text"
            class="w-full border border-gray-300 px-3 py-2 rounded focus:outline-none focus:ring-2 focus:ring-gray-800"
            placeholder="Nombre y apellido"
          />
        </div>

        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">Correo</label>
          <input
            formControlName="email"
            type="email"
            class="w-full border border-gray-300 px-3 py-2 rounded focus:outline-none focus:ring-2 focus:ring-gray-800"
            placeholder="usuario@correo.com"
          />
        </div>

        <div class="relative">
          <label class="block text-sm font-medium text-gray-700 mb-1">Contrasena</label>
          <input
            formControlName="password"
            [type]="showPassword ? 'text' : 'password'"
            class="w-full border border-gray-300 px-3 py-2 pr-10 rounded focus:outline-none focus:ring-2 focus:ring-gray-800"
            placeholder="Minimo 6 caracteres"
          />
          <button
            type="button"
            (click)="togglePassword()"
            class="absolute inset-y-0 right-0 top-6 px-3 flex items-center text-gray-500 hover:text-gray-800"
          >
            <lucide-icon
              [name]="showPassword ? icons.EyeOff : icons.Eye"
              class="h-5 w-5"
            ></lucide-icon>
          </button>
        </div>

        <div class="relative">
          <label class="block text-sm font-medium text-gray-700 mb-1">Confirmar contrasena</label>
          <input
            formControlName="confirmPassword"
            [type]="showConfirmPassword ? 'text' : 'password'"
            class="w-full border border-gray-300 px-3 py-2 pr-10 rounded focus:outline-none focus:ring-2 focus:ring-gray-800"
            placeholder="Repite la contrasena"
          />
          <button
            type="button"
            (click)="toggleConfirmPassword()"
            class="absolute inset-y-0 right-0 top-6 px-3 flex items-center text-gray-500 hover:text-gray-800"
          >
            <lucide-icon
              [name]="showConfirmPassword ? icons.EyeOff : icons.Eye"
              class="h-5 w-5"
            ></lucide-icon>
          </button>
        </div>

        <button
          type="submit"
          class="w-full bg-[#1f2937] text-white py-2.5 rounded font-medium hover:bg-black transition"
        >
          Crear cuenta
        </button>
      </form>

      <p class="text-sm text-center mt-5 text-gray-700">
        Ya tienes cuenta?
        <a routerLink="/login" class="underline">Iniciar sesion</a>
      </p>
    </div>

    <div
      class="hidden md:block md:w-1/2 bg-black bg-no-repeat bg-center bg-contain"
      style="background-image: url('/images/auth/login-bg.png')"
    ></div>
  </div>
</div>

<app-loading-spinner [show]="loading()"></app-loading-spinner>
