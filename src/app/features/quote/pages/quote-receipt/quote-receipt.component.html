<div class="mx-auto flex min-h-[calc(100vh-180px)] max-w-5xl items-center justify-center px-4 py-10 sm:px-6">
  <section class="w-full max-w-xl overflow-hidden bg-white shadow-[0_30px_90px_rgba(15,23,42,0.12)]">
    <div class="px-6 pb-8 pt-7 sm:px-8">
      <h1 class="text-center text-4xl font-semibold tracking-[-0.05em] text-[#0f1a2c]">
        Imprimir recibo
      </h1>

      <div class="mt-6 bg-[#d8f3ee] px-5 py-4 text-center text-base font-medium text-[#0f766e]">
        {{ receipt?.message || 'Recibo listo para impresion' }}
      </div>

      <div class="mt-8 space-y-5 text-[1.05rem] text-slate-800">
        <div class="flex flex-wrap items-center gap-2">
          <span class="font-medium text-slate-500">Mensaje:</span>
          <span>{{ receipt?.message }}</span>
        </div>

        <div class="flex flex-wrap items-center gap-2">
          <span class="font-medium text-slate-500">Valor:</span>
          <span>{{ receipt?.amount ?? 0 | appCurrency }}</span>
        </div>
      </div>

      <div class="mt-8 border-t border-slate-200 pt-6">
        <div class="grid gap-3 sm:grid-cols-2">
          <button
            type="button"
            (click)="printReceipt()"
            [disabled]="printing"
            class="inline-flex min-h-14 items-center justify-center border border-slate-300 bg-white px-6 text-base font-semibold text-slate-700 transition hover:border-slate-400 hover:bg-slate-50 disabled:cursor-not-allowed disabled:opacity-60"
          >
            {{ printing ? 'Imprimiendo...' : 'Imprimir comprobante' }}
          </button>

          <button
            type="button"
            (click)="goHome()"
            class="inline-flex min-h-14 items-center justify-center bg-[#5b34ea] px-6 text-base font-semibold text-white transition hover:bg-[#4b28d1]"
          >
            Regresar al inicio
          </button>
        </div>
      </div>
    </div>
  </section>
</div>
