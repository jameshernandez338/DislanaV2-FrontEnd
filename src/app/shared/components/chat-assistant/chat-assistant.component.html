<!-- Floating chat toggle button (positioned above WhatsApp button) -->
<button
  type="button"
  (click)="toggle()"
  class="fixed right-4 z-[65] inline-flex h-12 w-12 items-center justify-center rounded-full border-2 border-white bg-[#0f1a2c] text-white shadow-[0_14px_30px_rgba(15,26,44,0.35)] transition hover:scale-105 hover:bg-[#1a2f50] focus:outline-none focus-visible:ring-4 focus-visible:ring-[#0f1a2c]/25 sm:right-5 sm:h-14 sm:w-14"
  style="bottom: 88px"
  aria-label="Abrir chat"
  title="Chat con nosotros"
>
  @if (!isOpen()) {
    <!-- Robot icon -->
    <svg class="h-6 w-6 sm:h-7 sm:w-7" viewBox="0 0 24 24" fill="none" aria-hidden="true">
      <rect x="3" y="9" width="18" height="11" rx="2" stroke="currentColor" stroke-width="2"/>
      <path d="M8 14h.01M16 14h.01" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"/>
      <path d="M10 17.5h4" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
      <path d="M12 9V6" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
      <circle cx="12" cy="5" r="1.5" stroke="currentColor" stroke-width="1.5"/>
      <path d="M3 13h-1M22 13h-1" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
    </svg>
  } @else {
    <!-- Close icon -->
    <svg class="h-5 w-5 sm:h-6 sm:w-6" viewBox="0 0 24 24" fill="none" aria-hidden="true">
      <path d="M18 6L6 18M6 6l12 12" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"/>
    </svg>
  }
</button>

<!-- Chat panel -->
@if (isOpen()) {
  <div
    class="fixed right-4 z-[64] w-[340px] sm:right-5 sm:w-[370px] overflow-hidden rounded-2xl border border-slate-200 bg-white shadow-[0_20px_60px_rgba(0,0,0,0.18)]"
    style="bottom: 160px"
  >
    <!-- Header -->
    <div class="flex items-center gap-3 bg-[#0f1a2c] px-4 py-3.5">
      <div class="relative">
        <div class="h-10 w-10 rounded-full bg-[#1a2f50] flex items-center justify-center border-2 border-white/20">
          <svg class="h-5 w-5 text-white" viewBox="0 0 24 24" fill="none" aria-hidden="true">
            <rect x="3" y="9" width="18" height="11" rx="2" stroke="currentColor" stroke-width="2"/>
            <path d="M8 14h.01M16 14h.01" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"/>
            <path d="M10 17.5h4" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
            <path d="M12 9V6" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
            <circle cx="12" cy="5" r="1.5" stroke="currentColor" stroke-width="1.5"/>
            <path d="M3 13h-1M22 13h-1" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
          </svg>
        </div>
        <span class="absolute bottom-0 right-0 h-2.5 w-2.5 rounded-full bg-emerald-400 border-2 border-[#0f1a2c]"></span>
      </div>
      <div class="flex-1 min-w-0">
        <p class="text-sm font-semibold text-white leading-tight">Asistente Dislana</p>
        <p class="text-xs text-slate-400">Soporte en línea</p>
      </div>
      <button
        type="button"
        (click)="close()"
        class="flex h-7 w-7 items-center justify-center rounded-full text-slate-400 transition hover:bg-white/10 hover:text-white"
        aria-label="Cerrar chat"
      >
        <svg class="h-4 w-4" viewBox="0 0 24 24" fill="none" aria-hidden="true">
          <path d="M18 6L6 18M6 6l12 12" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
        </svg>
      </button>
    </div>

    <!-- Messages area -->
    <div #messagesContainer class="flex flex-col gap-3 bg-slate-50 px-4 py-4 h-64 overflow-y-auto">
      @for (msg of messages(); track $index) {
        @if (msg.role === 'bot') {
          <!-- Bot message -->
          <div class="flex items-end gap-2">
            <div class="h-7 w-7 shrink-0 rounded-full bg-[#0f1a2c] flex items-center justify-center">
              <svg class="h-3.5 w-3.5 text-white" viewBox="0 0 24 24" fill="none">
                <rect x="3" y="9" width="18" height="11" rx="2" stroke="currentColor" stroke-width="2"/>
                <path d="M8 14h.01M16 14h.01" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"/>
                <path d="M10 17.5h4" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
                <path d="M12 9V6" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
                <circle cx="12" cy="5" r="1.5" stroke="currentColor" stroke-width="1.5"/>
              </svg>
            </div>
            <div class="max-w-[75%]">
              <div class="rounded-2xl rounded-bl-sm bg-white border border-slate-200 px-3.5 py-2.5 shadow-sm">
                <p class="text-sm text-slate-800 leading-relaxed" [innerHTML]="parseMarkdown(msg.text)"></p>
                @if (msg.offerPdf && msg.pdfType) {
                  <button
                    type="button"
                    (click)="requestPdf(msg.pdfType!)"
                    [disabled]="isPdfLoading()"
                    class="mt-2 inline-flex items-center gap-1.5 rounded-full bg-[#0f1a2c] px-3 py-1.5 text-xs font-medium text-white transition hover:bg-[#1a2f50] disabled:opacity-50 disabled:cursor-not-allowed"
                  >
                    <svg class="h-3.5 w-3.5" viewBox="0 0 24 24" fill="none" aria-hidden="true">
                      <path d="M12 16l-4-4h3V4h2v8h3l-4 4z" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                      <path d="M4 20h16" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
                    </svg>
                    Descargar PDF
                  </button>
                }
              </div>
              <p class="mt-1 text-[10px] text-slate-400 ml-1">{{ msg.time | date:'HH:mm' }}</p>
            </div>
          </div>
        } @else {
          <!-- User message -->
          <div class="flex items-end justify-end gap-2">
            <div class="max-w-[75%]">
              <div class="rounded-2xl rounded-br-sm bg-[#0f1a2c] px-3.5 py-2.5 shadow-sm">
                <p class="text-sm text-white whitespace-pre-wrap">{{ msg.text }}</p>
              </div>
              <p class="mt-1 text-[10px] text-slate-400 text-right mr-1">{{ msg.time | date:'HH:mm' }}</p>
            </div>
          </div>
        }
      }

      <!-- Typing indicator -->
      @if (isLoading()) {
        <div class="flex items-end gap-2">
          <div class="h-7 w-7 shrink-0 rounded-full bg-[#0f1a2c] flex items-center justify-center">
            <svg class="h-3.5 w-3.5 text-white" viewBox="0 0 24 24" fill="none">
              <rect x="3" y="9" width="18" height="11" rx="2" stroke="currentColor" stroke-width="2"/>
              <path d="M8 14h.01M16 14h.01" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"/>
              <path d="M10 17.5h4" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
              <path d="M12 9V6" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
              <circle cx="12" cy="5" r="1.5" stroke="currentColor" stroke-width="1.5"/>
            </svg>
          </div>
          <div class="rounded-2xl rounded-bl-sm bg-white border border-slate-200 px-3.5 py-3 shadow-sm">
            <div class="flex items-center gap-1">
              <span class="h-2 w-2 rounded-full bg-slate-400 animate-bounce"></span>
              <span class="h-2 w-2 rounded-full bg-slate-400 animate-bounce [animation-delay:150ms]"></span>
              <span class="h-2 w-2 rounded-full bg-slate-400 animate-bounce [animation-delay:300ms]"></span>
            </div>
          </div>
        </div>
      }
    </div>

    <!-- Input area -->
    <div class="flex items-center gap-2 border-t border-slate-200 bg-white px-3 py-3">
      <input
        type="text"
        [(ngModel)]="inputText"
        (keydown)="onKeydown($event)"
        [disabled]="isLoading()"
        placeholder="Escribe un mensaje..."
        autocomplete="off"
        class="flex-1 rounded-full border border-slate-300 bg-slate-50 px-4 py-2 text-sm text-slate-800 placeholder-slate-400 outline-none focus:border-[#0f1a2c] focus:ring-2 focus:ring-[#0f1a2c]/10 transition disabled:opacity-50"
      />
      <button
        type="button"
        (click)="sendMessage()"
        [disabled]="isLoading() || !inputText.trim()"
        class="inline-flex h-9 w-9 shrink-0 items-center justify-center rounded-full bg-[#0f1a2c] text-white transition hover:bg-[#1a2f50] focus:outline-none focus-visible:ring-2 focus-visible:ring-[#0f1a2c]/30 disabled:opacity-40 disabled:cursor-not-allowed"
        aria-label="Enviar mensaje"
      >
        <svg class="h-4 w-4 translate-x-px" viewBox="0 0 24 24" fill="none" aria-hidden="true">
          <path d="M22 2L11 13M22 2L15 22l-4-9-9-4 20-7z" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </button>
    </div>
  </div>
}
