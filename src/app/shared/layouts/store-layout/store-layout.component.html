<div class="min-h-screen bg-[#f5f6f8] text-slate-900 flex flex-col">
  <app-header
    [menus]="headerMenus"
    [cartCount]="cartCount"
    [showUserMenu]="showUserMenu"
    (userToggle)="toggleUserMenu()"
    (cartToggle)="toggleCart()"
    (logout)="logout()"
  ></app-header>

  <main class="flex-1 flex flex-col">
    <router-outlet></router-outlet>
  </main>

  <app-footer></app-footer>

  @if (showCart) {
    <button
      type="button"
      class="fixed inset-0 bg-black/40 z-40"
      (click)="closeCart()"
      aria-label="Cerrar carrito"
    ></button>
  }

  <aside
    class="fixed top-0 right-0 h-full w-full max-w-[390px] bg-white z-50 shadow-2xl transition-transform duration-300"
    [ngClass]="showCart ? 'translate-x-0' : 'translate-x-full'"
  >
    <div class="h-full flex flex-col">
      <div class="p-5 border-b border-slate-200 flex items-center justify-between">
        <h2 class="text-2xl font-semibold">Tu compra</h2>
        <button type="button" (click)="closeCart()" class="text-slate-500 hover:text-slate-900">
          <lucide-icon [name]="icons.X" class="w-7 h-7"></lucide-icon>
        </button>
      </div>

      <div class="flex-1 overflow-y-auto p-5 space-y-5">
        @for (cartItem of cartItems; track cartItem.id) {
          <div class="border-b border-slate-200 pb-5">
            <div class="flex gap-4">
              <img [src]="cartItem.image" [alt]="cartItem.name" class="w-20 h-20 object-cover" />
              <div class="flex-1">
                <div class="flex items-start justify-between">
                  <p class="text-lg">{{ cartItem.name }}</p>
                  <button
                    type="button"
                    (click)="removeCartItem(cartItem.id)"
                    class="text-slate-600 hover:text-slate-900"
                    aria-label="Eliminar producto del carrito"
                  >
                    x
                  </button>
                </div>
                <div class="flex items-start justify-between gap-3 mt-1">
                  <div class="flex-1">
                    <p class="text-xs text-slate-500">{{ cartItem.qualityA }}</p>
                    <p class="text-xs text-slate-400 mt-1">{{ cartItem.unitPriceALabel }}</p>
                  </div>
                  <div class="flex-1">
                    <p class="text-xs text-red-600">{{ cartItem.qualityB }}</p>
                    <p class="text-xs text-red-400 mt-1">{{ cartItem.unitPriceBLabel }}</p>
                  </div>
                </div>
                <p class="mt-1 text-right text-md font-semibold">{{ cartItem.price }}</p>
              </div>
            </div>
          </div>
        }
      </div>

      <div class="p-5 border-t border-slate-200">
        <div class="flex items-center justify-between mb-5 text-[1.1rem]">
          <p>Subtotal</p>
          <p>{{ cartSubtotal }}</p>
        </div>
        <button
          type="button"
          (click)="goToCart()"
          class="w-full h-14 bg-[#141b2d] text-white text-md font-semibold hover:bg-black transition"
        >
          Ver Carrito
        </button>
      </div>
    </div>
  </aside>

  
</div>
